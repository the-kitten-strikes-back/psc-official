<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="{{ url_for('home') }}" class="logo">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="PSC Logo">
                    PSC
                </a>
                <ul class="nav-links">
                    <li><a href="{{ url_for('home') }}">Home</a></li>
                    <li><a href="{{ url_for('about') }}">About</a></li>
                    <li><a href="{{ url_for('register') }}">Sign Up</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="main-content" style="min-height: auto; padding: 80px 20px; background: linear-gradient(135deg, #f8fafc, #e2e8f0);">
            <div class="login-container">
                <h1 style="font-size: 2rem; margin-bottom: 30px;">PSC STRIKES BACK.</h1>
                {% if error %}
                <div style="background: #fee2e2; border: 2px solid #ef4444; border-radius: 12px; padding: 16px; margin-bottom: 24px; color: #991b1b; font-weight: 500;">
                    ⚠️ {{ error }}
                </div>
                {% endif %}
                <form method="POST" action="{{ url_for('login') }}">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="submit" style="margin-top: 20px;">Login</button>
                </form>
                <div class="login-link">
                    <p>Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <h2 class="footer-title">Explore</h2>
            <div class="footer-links">
                <a href="/" class="footer-link">Home</a>
                <a href="/about" class="footer-link">About Us</a>
                <a href="/loan" class="footer-link">Loan a Pen</a>
                <a href="/donate" class="footer-link">Donate a Pen</a>
                <a href="/sectors" class="footer-link">Sector Access</a>
            </div>
            <div style="margin-top: 50px; padding-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.1); text-align: center; color: #94a3b8;">
                <p>&copy; 2024 Pen Storage Company. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>

</body>
</html>
