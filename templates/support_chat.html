<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoBAB Live Support | PSC</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#f7eaff;
      --muted:#c1a9d6;
      --accent:#ff7bf5;
      --panel:rgba(24,10,36,0.78);
      --line:rgba(255,123,245,0.3);
      --shadow:0 30px 60px rgba(0,0,0,0.45);
    }
    body{
      margin:0;
      background:linear-gradient(180deg, #120e16 0%, #0f0b12 100%);
      color:var(--ink);
      font-family:"Space Grotesk", sans-serif;
      letter-spacing:0.2px;
      min-height:100vh;
      position:relative;
    }
    header{
      padding:28px 32px;
      border-bottom:1px solid var(--line);
      background:rgba(18,12,22,0.92);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    h1{
      margin:0;
      font-family:"Orbitron", sans-serif;
      letter-spacing:1px;
    }
    .subtitle{
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }
    .layout{
      max-width:920px;
      margin:30px auto 80px;
      padding:0 24px;
    }
    .panel{
      background:rgba(26,18,32,0.9);
      border:1px solid rgba(180,120,160,0.25);
      border-radius:16px;
      padding:24px;
      box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.03);
      backdrop-filter:blur(8px);
    }
    .chat-log{
      min-height:280px;
      max-height:380px;
      overflow:auto;
      margin-bottom:12px;
      padding-right:6px;
    }
    .chat-message{
      padding:10px 12px;
      margin-bottom:10px;
      border-radius:12px;
      background:rgba(18,12,22,0.9);
      border:1px solid rgba(180,120,160,0.2);
    }
    .chat-message strong{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    form{
      display:flex;
      gap:10px;
    }
    input{
      flex:1;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(180,120,160,0.35);
      background:rgba(18,12,22,0.9);
      color:var(--ink);
      font-size:14px;
    }
    .send-btn{
      padding:10px 14px;
      border-radius:10px;
      border:1px solid rgba(255,123,245,0.5);
      background:rgba(255,123,245,0.2);
      color:var(--ink);
      font-weight:600;
      cursor:pointer;
    }
    .note{
      color:var(--muted);
      font-size:13px;
      margin-top:12px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>SoBAB Live Support</h1>
      <div class="subtitle">Customer care chat with PSC.</div>
    </div>
  </header>
  <div class="layout">
    <div class="panel" data-support-chat data-room-id="{{ room_id }}" data-display-name="{{ display_name }}">
      <div id="support-chat-log" class="chat-log"></div>
      <form id="support-chat-form">
        <input id="support-chat-input" placeholder="Type your message..." autocomplete="off">
        <button class="send-btn" type="submit">Send</button>
      </form>
      <div class="note">A PSC SoBAB agent will respond as soon as possible.</div>
    </div>
  </div>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='support_chat.js') }}"></script>
</body>
</html>
