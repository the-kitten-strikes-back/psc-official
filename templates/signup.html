<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC | Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='chatbot.css') }}">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="{{ url_for('home') }}" class="logo">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="PSC Logo">
                    PSC
                </a>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <ul class="nav-links">
                        <li><a href="{{ url_for('home') }}">Home</a></li>
                        <li><a href="{{ url_for('about') }}">About</a></li>
                        <li><a href="{{ url_for('login') }}">Login</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="main-content">
            <div class="signup-container fade-in-up">
                <h1>Join PSC</h1>
                <p class="lead" style="margin-bottom: 30px;">Create your account and start the pen adventure</p>
                {% if error %}
                <div style="background: #fee2e2; border: 2px solid #ef4444; border-radius: 12px; padding: 16px; margin-bottom: 24px; color: #991b1b; font-weight: 500;">
                    ⚠️ {{ error }}
                </div>
                {% endif %}
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" class="form-input" placeholder="Choose your username" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <div class="input-wrapper">
                            <input type="email" name="email" id="email" class="form-input" placeholder="Enter your email" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" class="form-input" placeholder="Create a strong password" required>
                            <i class="fas fa-lock input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="dob">Date of Birth</label>
                        <div class="input-wrapper">
                            <input type="date" name="date" id="dob" class="form-input" required>
                            <i class="fas fa-calendar input-icon"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="margin-top: 20px; width: 100%;">Create Account</button>
                </form>
                <div class="login-link">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <h2 class="footer-title">Explore</h2>
            <div class="footer-links">
                <a href="/" class="footer-link">Home</a>
                <a href="/about" class="footer-link">About Us</a>
                <a href="/loan" class="footer-link">Loan a Pen</a>
                <a href="/donate" class="footer-link">Donate a Pen</a>
                <a href="/sectors" class="footer-link">Sector Access</a>
            </div>
            <div style="margin-top: 50px; padding-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.1); text-align: center; color: #94a3b8;">
                <p>&copy; 2024 Pen Storage Company. All rights reserved.</p>
            </div>
        </div>
    </footer>
  <div id="psc-chatbot-root"></div>
  <script src="{{ url_for('static', filename='chatbot.js') }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Theme toggle functionality
      const themeToggle = document.getElementById('theme-toggle');
      const html = document.documentElement;

      // Load saved theme
      const savedTheme = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);

      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';

        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
      });

      function updateThemeIcon(theme) {
        const icon = themeToggle.querySelector('i');
        icon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
      }
    });
  </script>
</body>
</html>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.addEventListener("click", () => {
                document.body.classList.add("fade-in");
            });
        });
    </script>
  <div id="psc-chatbot-root"></div>
  <script src="{{ url_for('static', filename='chatbot.js') }}"></script>
  <script src="{{ url_for('static', filename='easter_eggs.js') }}"></script>
</body>
</html>
