<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Orbitron';
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #111, #222);
            color: white;
            transition: background 4s ease-in-out;
            font-family: 'Orbitron';
        }

        /* When clicked, this fades smoothly */
        body.fade-in {
            background: linear-gradient(135deg, #6600ff, #ff0077, #ffbb00);
            background-size: 300% 300%;
            animation: gradientShift 8s ease-in-out forwards;
        }

        /* Subtle movement for the gradient */
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .signup-container {
            background: rgba(0, 0, 0, 0.65);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px #000000b9;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(4px);
            transition: opacity 2s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #09ff00;
            font-size: 28px;
            text-shadow: 0 0 10px #09ff00, 0 0 25px #00ffcc;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 80px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #ba19eb;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            padding: 14px 16px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 2px solid #333;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Orbitron';
        }

        input::placeholder {
            color: #ccc;
        }

        input:focus {
            border-color: #09ff00;
            box-shadow: 0 0 15px rgba(9, 255, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            background: linear-gradient(135deg, #f44336, #ff0040);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
            font-family: 'Orbitron';
        }

        button:hover {
            background: linear-gradient(135deg, #ff0040, #ff4081);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 64, 0.5);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .login-link p {
            color: #ccc;
            margin: 0;
        }

        .login-link a {
            color: #ba19eb;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #ff0077;
            text-decoration: underline;
        }

        /* Footer with links */
        .footer {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 20px;
            border-top: 2px solid #09ff00;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-title {
            text-align: center;
            color: #09ff00;
            margin: 0 0 30px 0;
            font-size: 20px;
            text-shadow: 0 0 10px #09ff00;
        }

        .footer-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        .footer-link {
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            color: #ba19eb;
            padding: 14px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1.5px solid #ba19eb;
            text-align: center;
            font-size: 13px;
        }

        .footer-link:hover {
            background: linear-gradient(135deg, #ba19eb, #9c27b0);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(186, 25, 235, 0.4);
            border-color: #ff0077;
        }

        @media (max-width: 768px) {
            .signup-container {
                max-width: 350px;
                padding: 30px 40px;
            }

            h2 {
                font-size: 24px;
            }

            .footer-links {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .signup-container {
                max-width: calc(100% - 20px);
                padding: 25px 30px;
            }

            .footer {
                padding: 30px 15px;
            }

            .footer-links {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>
<body>
    <div class="main-content">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="PSC Logo">
        </div>
        <div class="signup-container">
            <h2>P<sup>en</sup>S<sup>tealing</sup>C<sup>ompany</sup></h2>
            <form method="POST" action="{{ url_for('register') }}">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>
                
                <label for="dob">Date of Birth</label>
                <input type="date" name="date" id="dob" required>

                <button type="submit">Sign Up</button>
            </form>
            <div class="login-link">
                <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <h2 class="footer-title">Explore</h2>
            <div class="footer-links">
                <a href="/" class="footer-link">Home</a>
                <a href="/about" class="footer-link">About Us</a>
                <a href="/partnerships" class="footer-link">Partnerships</a>
                <a href="/contact" class="footer-link">Contact Us</a>
                <a href="/donate" class="footer-link">Donate a Pen</a>
                <a href="/loan" class="footer-link">Loan a Pen</a>
                <a href="/stocks" class="footer-link">Invest in PSC</a>
                <a href="/admin" class="footer-link">Admin Page</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.addEventListener("click", () => {
                document.body.classList.add("fade-in");
            });
        });
    </script>
</body>
</html>
