<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="main-content">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="PSC Logo">
        </div>
        <div class="signup-container">
            <h2>P<sup>en</sup>S<sup>tealing</sup>C<sup>ompany</sup></h2>
            <form method="POST" action="{{ url_for('register') }}">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>
                
                <label for="dob">Date of Birth</label>
                <input type="date" name="date" id="dob" required>

                <button type="submit">Sign Up</button>
            </form>
            <div class="login-link">
                <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <h2 class="footer-title">Explore</h2>
            <div class="footer-links">
                <a href="/" class="footer-link">Home</a>
                <a href="/about" class="footer-link">About Us</a>
                <a href="/partnerships" class="footer-link">Partnerships</a>
                <a href="/contact" class="footer-link">Contact Us</a>
                <a href="/donate" class="footer-link">Donate a Pen</a>
                <a href="/loan" class="footer-link">Loan a Pen</a>
                <a href="/stocks" class="footer-link">Invest in PSC</a>
                <a href="/admin" class="footer-link">Admin Page</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.addEventListener("click", () => {
                document.body.classList.add("fade-in");
            });
        });
    </script>
</body>
</html>
