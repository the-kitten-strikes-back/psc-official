<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied | PSC</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, #0e121a 0%, #0b0f16 100%);
      color:#e6eef8;
      font-family:"Space Grotesk", sans-serif;
    }
    .card{
      max-width:520px;
      margin:24px;
      padding:28px;
      border-radius:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 20px 40px rgba(0,0,0,0.35);
      text-align:center;
    }
    h1{
      margin:0 0 10px;
      font-size:28px;
    }
    p{
      margin:0;
      color:#b7c4d3;
      line-height:1.5;
    }
    a{
      display:inline-block;
      margin-top:18px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.2);
      color:#e6eef8;
      text-decoration:none;
      font-weight:600;
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='chatbot.css') }}">
</head>
<body>
  <div class="card">
    <h1>Access Denied</h1>
    <p>You need admin clearance to enter PSC sector consoles.</p>
    <a href="{{ url_for('home') }}">Return Home</a>
  </div>
  <div id="psc-chatbot-root"></div>
  <script src="{{ url_for('static', filename='chatbot.js') }}"></script>
</body>
</html>
